name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package (editable) with dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (lint + import order)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: MyPy (type check)
        run: mypy src

      - name: Pytest (unit tests)
        run: pytest -m unit

      - name: Bootstrap smoke test
        run: |
          nikola | grep -q "Bootstrap successful"
