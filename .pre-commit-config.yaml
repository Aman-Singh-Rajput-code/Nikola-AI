# =============================================================================
# .pre-commit-config.yaml — Nikola AI
#
# Runs Ruff (lint + import sort), Black (format), and MyPy (type-check)
# automatically on every `git commit`, so style/type issues are caught before
# they ever reach a PR or CI. Install the hooks once per clone with:
#   pre-commit install
# =============================================================================

repos:
  # --- General hygiene hooks (whitespace, file endings, merge conflicts) -----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: mixed-line-ending

  # --- Ruff: linting + import sorting (fast, runs first) ----------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]

  # --- Black: code formatting -------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  # --- MyPy: static type checking ---------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: ["typer>=0.12"]
        args: ["--config-file=pyproject.toml"]
        files: ^src/
